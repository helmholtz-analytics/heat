name: Release Drafter

on:
  pull_request:
    types: [opened, reopened]
permissions:
  contents: read

jobs:
  debug_info:
    runs-on: ubuntu-latest
    if: ${{ secrets.GITHUB_TOKEN == '' }}
    steps:
      - run: echo "Secret GITHUB_TOKEN must be set in order to run this workflow"

  update_release_draft:
    permissions:
      contents: write  # for release-drafter/release-drafter to create a github release
      pull-requests: write  # for release-drafter/release-drafter to add label to PR
    runs-on: ubuntu-latest
    if: ${{ secrets.GITHUB_TOKEN != '' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commitish: 'stable'
          name: ${{ github.ref_name }} - Draft release
          config-name: rd-release-config.yml
