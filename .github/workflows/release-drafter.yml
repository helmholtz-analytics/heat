name: Release Drafter

on:
  pull_request:
    types: [opened, reopened]
permissions:
  contents: read

jobs:

  update_release_draft:
    permissions:
      contents: write  # for release-drafter/release-drafter to create a github release
      pull-requests: write  # for release-drafter/release-drafter to add label to PR
    runs-on: ubuntu-latest
    steps:
      - name: Exit if secret is missing
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "Secret GITHUB_TOKEN not set, skipping job."
            exit 0
          fi

      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commitish: 'stable'
          name: ${{ github.ref_name }} - Draft release
          config-name: rd-release-config.yml
