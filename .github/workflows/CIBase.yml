name: Start CI Run

on:
  push:
    branches:
      - 'main'
      - 'stable'

permissions:
  contents: read

jobs:
  starter:
    runs-on: ubuntu-latest
    steps:
      - name: Exit if secret is missing
        run: |
          if [ -z "${{ secrets.CB_PIPELINE }}" ]; then
            echo "Secret CB_PIPELINE not set, skipping job."
            exit 0
          fi

      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@5250492686b253f06fa55861556d1027b067aeb5 # v9.0.2

      - name: 'start test'
        run: |
         curl -s -X POST \
           --fail \
           -F token=${{ secrets.CB_PIPELINE }} \
           -F "ref=heat/base" \
           -F "variables[SHA]=$GITHUB_SHA" \
           -F "variables[GHBRANCH]=${{ steps.branch-names.outputs.current_branch }}" \
           https://codebase.helmholtz.cloud/api/v4/projects/7605/trigger/pipeline -o /dev/null
