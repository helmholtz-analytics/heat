name: On PR Update

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/**'
      - 'heat/**'
      - 'tests/**'

jobs:
  quick-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        py-version:
          - '3.11' # Oldest supported
          - '3.14' # Latest stable
        mpi: [ 'openmpi' ]
        install-options: [ '.[dev]' ]
        pytorch-version:
          - 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'   # Oldest supported
          - 'torch==2.11.0 torchvision==0.26.0 torchaudio==2.11.0' # Latest stable
        exclude:
          - py-version: '3.14'
            pytorch-version: 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'
    name: Quick Tests - Py${{ matrix.py-version }} with ${{ matrix.pytorch-version }}"
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/gh_tests
        with:
          mode: quick
          sha: ${{ github.event.pull_request.head.sha }}
          py-version: ${{ matrix.py-version }}
          mpi: ${{ matrix.mpi }}
          install-options: ${{ matrix.install-options }}
          pytorch-version: ${{ matrix.pytorch-version }}

  trigger-tests:
    name: Trigger Codebase Tests
    runs-on: ubuntu-latest
    needs: quick-tests
    if: ${{ !github.event.repository.fork }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/trigger_codebase_tests
        with:
          branch: ${{ github.head_ref }}
          sha: ${{ github.event.pull_request.head.sha }}
          pr_number: ${{ github.event.pull_request.number }}
          trigger_token: ${{ secrets.CX_TRIGGER_TOKEN }}

  trigger-benchmarks:
    name: Trigger Codebase Benchmarks
    runs-on: ubuntu-latest
    needs: trigger-tests
    if: ${{ !github.event.repository.fork && contains(github.event.pull_request.labels.*.name, 'benchmark PR') }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/trigger_codebase_benchmarks
        with:
          branch: ${{ github.head_ref }}
          sha: ${{ github.event.pull_request.head.sha }}
          author: ${{ github.event.pull_request.assignee.login || 'heat_team' }}
          pr_number: ${{ github.event.pull_request.number }}
          trigger_token: ${{ secrets.CX_TRIGGER_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
