name: On PR Update

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/**'
      - 'heat/**'
      - 'tests/**'

jobs:
  test-pr:
    name: Test and Benchmark Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: ./.github/actions/gh_tests
        with:
          mode: quick
          sha: ${{ github.event.pull_request.head.sha }}
      # The next two steps only run if the PR is not from a fork, and if the quick tests passed.
      - uses: ./.github/actions/trigger_codebase_tests
        if: ${{ !github.event.repository.fork && success() }}
        with:
          branch: ${{ github.head_ref }}
          sha: ${{ github.event.pull_request.head.sha }}
          pr_number: ${{ github.event.pull_request.number }}
          trigger_token: ${{ secrets.CX_TRIGGER_TOKEN }}
      - uses: ./.github/actions/trigger_codebase_benchmarks
        if: ${{ !github.event.repository.fork  && success() && contains(github.event.pull_request.labels.*.name, 'benchmark PR') }}
        with:
          branch: ${{ github.head_ref }}
          sha: ${{ github.event.pull_request.head.sha }}
          author: ${{ github.event.pull_request.assignee.login || 'heat_team' }}
          pr_number: ${{ github.event.pull_request.number }}
          trigger_token: ${{ secrets.CX_TRIGGER_TOKEN }}
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit
      - name: 'Checkout Repository'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
