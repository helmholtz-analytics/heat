name: ci

on:
  push:
    branches-ignore:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        py-version:
          - '3.11' # Oldest supported
          - '3.14' # Latest stable
        mpi: [ 'openmpi' ]
        install-options: [ '.', '.[dev]' ]
        pytorch-version:
          - 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'   # Oldest supported
          - 'torch==2.9.1 torchvision==0.24.1 torchaudio==2.9.1'   # JSC Stage 2026
          - 'torch==2.11.0 torchvision==0.26.0 torchaudio==2.11.0' # Latest stable
        exclude:
          - py-version: '3.14'
            pytorch-version: 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'

    name: Python ${{ matrix.py-version }} with ${{ matrix.pytorch-version }}; options ${{ matrix.install-options }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup MPI
        uses: mpi4py/setup-mpi@dbbb80b116bea57fc1788daf7dbbf7ab3df3a0f1 # v1.4.2
        with:
          mpi: ${{ matrix.mpi }}

      - name: Use Python ${{ matrix.py-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.py-version }}
          architecture: x64

      - name: Install heat
        run: |
          pip install pytest
          pip install ${{ matrix.pytorch-version }} ${{ matrix.install-options }} --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run serial tests
        run: |
          # use pytest -vv -x for debugging
          pytest

      - name: Run parallel tests
        run: |
          mpirun -n 4 pytest -vs tests/core/test_random.py
