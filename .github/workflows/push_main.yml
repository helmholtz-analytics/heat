name: On Push Main
on:
  push:
    branches:
      - main
      - stable
    paths:
      - 'heat/**'
      - 'tests/**'
      - 'pyproject.toml'
jobs:
  codebase-test-and-bench-main:
    name: Testing and
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/trigger_codebase_tests
        with:
          branch: "main"
          sha: ${{ github.sha}}
          trigger_token: ${{ secrets.CX_TRIGGER_TOKEN }}
      - uses: ./.github/actions/trigger_codebase_benchmarks
        with:
          branch: "main"
          sha: ${{ github.sha}}
          author: ${{ 'heat_team' }}
          trigger_token: ${{ secrets.CX_TRIGGER_TOKEN }}
  gh-matrix-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        py-version:
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        mpi: [ 'openmpi' ]
        install-options: [ '.', '.[hdf5,netcdf,pandas,zarr]' ]
        pytorch-version:
          - 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'
          - 'torch==2.4.1 torchvision==0.19.1 torchaudio==2.4.1'
          - 'torch==2.5.1 torchvision==0.20.1 torchaudio==2.5.1'
          - 'torch==2.6.0 torchvision==0.21.0 torchaudio==2.6.0'
          - 'torch==2.7.1 torchvision==0.22.1 torchaudio==2.7.1'
          - 'torch==2.8.0 torchvision==0.23.0 torchaudio==2.8.0'
          - 'torch==2.9.1 torchvision==0.24.1 torchaudio==2.9.1'
          - 'torch==2.10.0 torchvision==0.25.0 torchaudio==2.10.0'
          - 'torch==2.11.0 torchvision==0.26.0 torchaudio==2.11.0'
        exclude:
          - py-version: '3.14'
            pytorch-version: 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'
          - py-version: '3.14'
            pytorch-version: 'torch==2.4.1 torchvision==0.19.1 torchaudio==2.4.1'
          - py-version: '3.14'
            pytorch-version: 'torch==2.5.1 torchvision==0.20.1 torchaudio==2.5.1'
          - py-version: '3.14'
            pytorch-version: 'torch==2.6.0 torchvision==0.21.0 torchaudio==2.6.0'
          - py-version: '3.14'
            pytorch-version: 'torch==2.7.1 torchvision==0.22.1 torchaudio==2.7.1'
          - py-version: '3.14'
            pytorch-version: 'torch==2.8.0 torchvision==0.23.0 torchaudio==2.8.0'
          - py-version: '3.13'
            pytorch-version: 'torch==2.3.1 torchvision==0.18.1 torchaudio==2.3.1'
          - py-version: '3.13'
            pytorch-version: 'torch==2.4.1 torchvision==0.19.1 torchaudio==2.4.1'
          - py-version: '3.13'
            pytorch-version: 'torch==2.5.1 torchvision==0.20.1 torchaudio==2.5.1'

    name: Python ${{ matrix.py-version }} with ${{ matrix.pytorch-version }}; options ${{ matrix.install-options }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/gh_tests
        with:
          mode: "full"
          py-version: ${{ matrix.py-version }}
          mpi: ${{ matrix.mpi }}
          install-options: ${{ matrix.install-options }}
          pytorch-version: ${{ matrix.pytorch-version }}
