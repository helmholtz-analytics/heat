name: GH Quick Tests
description: "Run quick tests on pull request updates to provide fast feedback to developers."
inputs:
  sha:
    description: "The commit SHA to run tests on. Defaults to the current commit."
    required: false
    default: "${{ github.sha }}"
runs:
  using: "composite"
  steps:
    - name: Harden Runner
      uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.sha }}
    - name: Use Python
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
      with:
        python-version: '3.14'
        architecture: x64
    - name: Setup MPI
      uses: mpi4py/setup-mpi@40c19a60792debf8ca403a3e6ee5f84c4e76555d # v1.2.1
      with:
        mpi: openmpi
    - name: Test
      shell: bash
      run: |
        pip install .[dev]
        pip install pytest
        pre-commit run --all-files
        pytest
